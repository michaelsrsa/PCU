<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PARMESAN CINEMATIC UNIVERSE</title>
    <style>
        /* Base Styling */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Courier New', Courier, monospace;
            color: #fff;
        }

        /* Your Custom Background Image */
        .background-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('background.png'); /* References your uploaded image */
            background-size: cover;
            background-position: center;
            opacity: 0.4; /* Slightly dimmed so menu text is easy to read */
            z-index: 1;
        }

        /* Retro "Press Start" Boot Screen */
        #boot-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 99;
            cursor: pointer;
            transition: opacity 1s ease-out;
        }

        .heart-pointer {
            color: #ff0000;
            font-size: 32px;
            margin-bottom: 20px;
            animation: pulse 1s infinite alternate;
        }

        @keyframes pulse {
            from { transform: scale(1); }
            to { transform: scale(1.2); }
        }

        /* Main Game Menu UI */
        .menu-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2;
        }

        .menu-container {
            border: 4px solid #fff;
            padding: 30px;
            background: rgba(0, 0, 0, 0.85);
            width: 90%;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.25);
        }

        h1 {
            font-size: 24px;
            margin-top: 0;
            margin-bottom: 20px;
            letter-spacing: 2px;
            text-shadow: 2px 2px #ff0000;
        }

        .menu-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .menu-item {
            padding: 12px;
            margin: 10px 0;
            border: 2px solid #555;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: bold;
            display: block;
            text-decoration: none;
            color: #fff;
        }

        .menu-item:hover {
            border-color: #ffe600;
            background-color: #111;
            transform: scale(1.03);
            text-shadow: 0 0 5px #ffe600;
        }

        .footer {
            margin-top: 20px;
            font-size: 10px;
            color: #666;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <!-- Invisible Audio Element targeting your custom music -->
    <audio id="bg-music" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <!-- 1. The Boot Screen (Solves Browser Audio Rules) -->
    <div id="boot-screen" onclick="startEngine()">
        <div class="heart-pointer">♥</div>
        <div style="font-size: 18px; letter-spacing: 4px; font-weight: bold;">PRESS ANYWHERE TO BOOT</div>
    </div>

    <!-- 2. The Custom Background -->
    <div class="background-overlay"></div>

    <!-- 3. The Interactive Menu -->
    <div class="menu-wrapper">
        <div class="menu-container">
            <h1>PARMESAN CINEMATIC UNIVERSE</h1>
            <div class="menu-list">
                <!-- SWAP THE '#' WITH YOUR REAL GOOGLE DRIVE SHARING LINKS -->
                <a href="#" target="_blank" class="menu-item">EPISODE 1: THE ORIGIN</a>
                <a href="#" target="_blank" class="menu-item">EPISODE 2: SECOND GRATE</a>
                <a href="#" target="_blank" class="menu-item">EPISODE 3: VQANGUARD</a>
                <a href="#" target="_blank" class="menu-item">EPISODE 4: DEEMOZINE</a>
                <a href="#" target="_blank" class="menu-item">EPISODE 5: START MASTERPIECE</a>
            </div>
            <div class="footer">32-MONTHS AGED // AUTISM EXPANSION ACTIVE</div>
        </div>
    </div>

    <script>
        // Fades out the boot screen, initializes audio context, and starts the music loop
        function startEngine() {
            const music = document.getElementById('bg-music');
            const bootScreen = document.getElementById('boot-screen');
            
            // Play custom music
            music.play().catch(error => {
                console.log("Audio play failed, waiting for direct click interaction:", error);
            });
            
            // Smoothly fade out boot screen
            bootScreen.style.opacity = '0';
            setTimeout(() => {
                bootScreen.style.display = 'none';
            }, 1000);
        }
    </script>
</body>
</html>
